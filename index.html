<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SPEED CHALLENGE — HIGH MULTIPLIER MODE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* MAIN CARD */
    .game-container {
      max-width: 1400px;
      width: 100%;
      background: rgba(10, 20, 30, 0.65);
      backdrop-filter: blur(8px);
      border-radius: 3rem;
      border: 1px solid rgba(0, 255, 255, 0.25);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 255, 0.1);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    /* HEADER WITH MULTIPLIER BADGE */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      padding: 1.2rem 2rem;
      background: rgba(0, 0, 0, 0.6);
      border-bottom: 1px solid rgba(0, 255, 255, 0.4);
      gap: 15px;
    }

    .title h1 {
      font-size: 1.9rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff, #0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 5px rgba(0,255,255,0.3);
    }

    .title p {
      color: #8eacc5;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .multiplier-badge {
      background: linear-gradient(145deg, #1f2a3a, #0a0f17);
      padding: 0.6rem 1.4rem;
      border-radius: 60px;
      border-left: 3px solid #f0f;
      border-right: 3px solid #0ff;
      box-shadow: 0 0 10px rgba(0,255,255,0.3);
    }

    .multiplier-badge span:first-child {
      font-size: 0.85rem;
      text-transform: uppercase;
      font-weight: 600;
      color: #b0e0ff;
      letter-spacing: 1px;
    }

    .multiplier-badge span:last-child {
      font-size: 2.2rem;
      font-weight: 800;
      margin-left: 12px;
      background: linear-gradient(135deg, #ffd966, #ff66cc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* TWO COLUMN LAYOUT */
    .split-layout {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
    }

    /* CAMERA AREA */
    .camera-panel {
      flex: 2;
      min-width: 320px;
      background: #00000030;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(0, 255, 255, 0.3);
      background: #000;
    }

    video, canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 28px;
    }

    video {
      transform: scaleX(-1);
      z-index: 1;
    }

    canvas {
      z-index: 2;
      pointer-events: none;
    }

    #videoElement {
      display: block;
    }

    .video-wrapper {
      aspect-ratio: 4 / 3;
      position: relative;
    }

    /* control buttons overlay */
    .cam-controls {
      margin-top: 1.2rem;
      display: flex;
      gap: 15px;
      z-index: 5;
    }

    .btn {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid cyan;
      color: cyan;
      font-weight: bold;
      padding: 8px 24px;
      border-radius: 40px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: linear-gradient(95deg, #0ff, #0a7);
      border: none;
      color: #000;
      font-weight: 800;
      box-shadow: 0 0 8px cyan;
    }

    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px #0ff;
    }

    .btn-danger {
      border-color: #ff4d6d;
      color: #ff4d6d;
    }

    /* SCOREBOARD PANEL */
    .score-panel {
      flex: 1.2;
      min-width: 280px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      padding: 1.8rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      border-left: 1px solid rgba(0, 255, 255, 0.3);
    }

    .stats {
      text-align: center;
    }

    .current-score {
      font-size: 4.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1;
      letter-spacing: 2px;
      text-shadow: 0 0 20px cyan;
    }

    .score-label {
      font-size: 1rem;
      letter-spacing: 2px;
      color: #9fc6e3;
      margin-top: 8px;
    }

    .raw-counter {
      font-size: 1.5rem;
      font-weight: 600;
      background: #0f1722;
      display: inline-block;
      padding: 6px 16px;
      border-radius: 40px;
      color: #facc15;
      margin-top: 10px;
    }

    .timer-box {
      background: #01010170;
      border-radius: 32px;
      padding: 0.8rem;
    }

    .timer-digits {
      font-size: 3.2rem;
      font-family: monospace;
      font-weight: 800;
      background: #000000aa;
      border-radius: 50px;
      padding: 8px;
      letter-spacing: 6px;
      color: #0ff;
      text-shadow: 0 0 5px cyan;
    }

    .settings-panel {
      margin-top: auto;
      background: rgba(15, 25, 35, 0.7);
      border-radius: 28px;
      padding: 1rem;
    }

    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 12px 0;
    }

    .setting-row label {
      font-weight: 500;
      color: #bbd4ff;
    }

    input {
      background: #000000aa;
      border: 1px solid cyan;
      padding: 6px 12px;
      border-radius: 20px;
      color: #0ff;
      font-weight: bold;
      width: 90px;
      text-align: center;
      font-size: 1.1rem;
    }

    .status-msg {
      font-size: 0.8rem;
      text-align: center;
      color: #ffaa44;
      background: #00000066;
      border-radius: 24px;
      padding: 6px;
      margin-top: 10px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(0.2);
    }

    @media (max-width: 780px) {
      .game-header {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .current-score {
        font-size: 3rem;
      }
      .timer-digits {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>

<div class="game-container">
  <div class="game-header">
    <div class="title">
      <h1>⚡ SPEED CHALLENGE ⚡</h1>
      <p>AI hand tracking | arm pump = multiplier rush</p>
    </div>
    <div class="multiplier-badge">
      <span>🔥 ACTIVE MULTIPLIER 🔥</span>
      <span id="multiplierDisplay">10x</span>
    </div>
  </div>

  <div class="split-layout">
    <!-- CAMERA + HAND TRACKING -->
    <div class="camera-panel">
      <div class="video-wrapper">
        <video id="videoElement" autoplay playsinline muted></video>
        <canvas id="outputCanvas"></canvas>
      </div>
      <div class="cam-controls">
        <button id="startGameBtn" class="btn btn-primary">▶ START GAME</button>
        <button id="resetGameBtn" class="btn">⟳ RESET</button>
      </div>
      <div class="status-msg" id="gameStatusMsg">⚙️ Ready — press START, then raise your hand above shoulder level repeatedly!</div>
    </div>

    <!-- SCORE + SETTINGS -->
    <div class="score-panel">
      <div class="stats">
        <div class="current-score" id="totalScoreDisplay">0</div>
        <div class="score-label">🏆 TOTAL SCORE (multiplied) 🏆</div>
        <div class="raw-counter">RAW PUMPS: <span id="rawPumpCount">0</span></div>
      </div>
      <div class="timer-box">
        <div style="font-size:0.9rem; margin-bottom:6px;">⏱️ TIME LEFT</div>
        <div class="timer-digits" id="timerDisplay">20.00</div>
      </div>

      <div class="settings-panel">
        <div class="setting-row">
          <label>🎯 GAME DURATION (sec)</label>
          <input type="number" id="gameDurationInput" value="20" step="1" min="5" max="60">
        </div>
        <div class="setting-row">
          <label>✨ SCORE MULTIPLIER ✨</label>
          <input type="number" id="multiplierInput" value="10" step="1" min="1" max="999">
        </div>
        <div class="setting-row">
          <label>📈 PUMP THRESHOLD (y)</label>
          <input type="number" id="thresholdInput" value="0.40" step="0.02" min="0.1" max="0.8">
          <span style="font-size:10px;">(lower = easier)</span>
        </div>
        <div class="status-msg" id="debugInfo">🤚 waiting for hand...</div>
      </div>
    </div>
  </div>
</div>

<!-- MediaPipe + TensorFlow libraries -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.10.0/dist/tf-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.10.0/dist/tf-backend-webgl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.0/dist/hand-pose-detection.min.js"></script>

<script>
  (function(){
    // ------------------- DOM elements -------------------
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');

    // UI
    const startBtn = document.getElementById('startGameBtn');
    const resetBtn = document.getElementById('resetGameBtn');
    const totalScoreSpan = document.getElementById('totalScoreDisplay');
    const rawCountSpan = document.getElementById('rawPumpCount');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const multiplierDisplaySpan = document.getElementById('multiplierDisplay');
    const gameStatusSpan = document.getElementById('gameStatusMsg');
    const debugInfoSpan = document.getElementById('debugInfo');

    // Inputs
    const durationInput = document.getElementById('gameDurationInput');
    const multiplierInput = document.getElementById('multiplierInput');
    const thresholdInput = document.getElementById('thresholdInput');

    // ------------------- Game state -------------------
    let gameActive = false;         // is the timer running & scoring?
    let currentRawPumps = 0;        // raw arm pumps (without multiplier)
    let totalScore = 0;             // multiplied score
    let timeLeft = 20.0;            // seconds
    let timerInterval = null;
    let animationFrameId = null;

    // Pump detection state machine
    let armUp = false;              // current frame hand is "up" (above shoulder)
    let lastArmUp = false;          // previous frame state
    let pumpCooldown = false;       // small debounce to avoid double trigger
    let lastPumpTimestamp = 0;
    const COOLDOWN_MS = 180;        // ms between pumps (prevents overcounting)

    // MediaPipe detection objects
    let detector = null;
    let detectionModel = null;
    let cameraRunning = true;

    // Hand landmark index: WRIST = 0, INDEX_FINGER_MCP = 5, MIDDLE_FINGER_MCP = 9, etc.
    // We will use wrist (0) and middle finger MCP (9) or index finger tip (8) to track height.
    // The idea: shoulder approximation is based on relative y coordinate. Since camera is mirrored, we'll use normalized y of wrist relative to hand bounding box?
    // Actually better: use wrist y coordinate vs "shoulder reference". Because no pose detection for shoulders, we use a simple adaptive baseline:
    // The "up" threshold: if wrist y < threshold value (normalized 0..1), means hand is raised high.
    // We'll set a default threshold (0.4) meaning if wrist y normalized is less than 0.4 (top of frame) -> up.
    let pumpThreshold = 0.40;       // updated from input

    // Helper: update multiplier display from UI
    function updateMultiplierDisplay() {
      let mult = parseInt(multiplierInput.value, 10);
      if (isNaN(mult)) mult = 10;
      multiplierDisplaySpan.innerText = `${mult}x`;
    }

    // Call this when a pump is detected
    function registerPump() {
      if (!gameActive) return;
      const now = Date.now();
      if (now - lastPumpTimestamp < COOLDOWN_MS) return;
      lastPumpTimestamp = now;

      // increase raw pumps
      currentRawPumps++;
      const mult = parseInt(multiplierInput.value, 10);
      const addPoints = isNaN(mult) ? 10 : mult;
      totalScore += addPoints;

      // update UI
      rawCountSpan.innerText = currentRawPumps;
      totalScoreSpan.innerText = totalScore;

      // visual flash effect on canvas
      ctx.save();
      ctx.globalAlpha = 0.6;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
      setTimeout(() => {}, 40);

      // small haptic-like console feedback
      gameStatusSpan.innerText = `💥 PUMP! +${addPoints} points! 💥`;
      setTimeout(() => {
        if (gameActive) gameStatusSpan.innerText = `🎮 GAME ACTIVE | pumps: ${currentRawPumps}`;
        else if (!gameActive && timerInterval===null) gameStatusSpan.innerText = `⚙️ Ready — press START`;
      }, 400);
    }

    // Update pump state based on hand landmark Y position
    function evaluateHandPose(landmarks) {
      if (!landmarks || landmarks.length === 0) {
        debugInfoSpan.innerText = "🤚 No hand detected. Show hand to camera!";
        armUp = false;
        return;
      }
      const wrist = landmarks[0];          // wrist landmark (x,y)
      if (!wrist) return;
      // normalized y (0 at top, 1 at bottom of frame)
      const yNorm = wrist.y;
      const threshold = pumpThreshold;
      const isUp = yNorm < threshold;
      armUp = isUp;

      // update debug info
      let debugMsg = `✋ Hand detected | wrist Y: ${yNorm.toFixed(2)} | ${isUp ? '⬆️ ARM RAISED' : '⬇️ ARM DOWN'}`;
      debugInfoSpan.innerText = debugMsg;

      // trigger pump on rising edge (was down, now up)
      if (!lastArmUp && armUp) {
        registerPump();
      }
      lastArmUp = armUp;
    }

    // draw hand landmarks on canvas
    function drawHandLandmarks(landmarks, width, height) {
      if (!landmarks) return;
      for (let i = 0; i < landmarks.length; i++) {
        const x = landmarks[i].x * width;
        const y = landmarks[i].y * height;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, 2 * Math.PI);
        ctx.fillStyle = '#0ff';
        ctx.fill();
        ctx.strokeStyle = '#ff66cc';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      // draw wrist to elbow style line?
      if (landmarks[0] && landmarks[5]) {
        const wristX = landmarks[0].x * width;
        const wristY = landmarks[0].y * height;
        const midX = landmarks[5].x * width;
        const midY = landmarks[5].y * height;
        ctx.beginPath();
        ctx.moveTo(wristX, wristY);
        ctx.lineTo(midX, midY);
        ctx.strokeStyle = '#f0f';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
    }

    // Main detection loop using handPoseDetection
    async function detectHands() {
      if (!detector || !video.videoWidth || !video.videoHeight) {
        requestAnimationFrame(detectHands);
        return;
      }
      try {
        const hands = await detector.estimateHands(video);
        // resize canvas to match video
        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        let activeLandmarks = null;
        if (hands && hands.length > 0) {
          // take first hand
          const hand = hands[0];
          if (hand.keypoints && hand.keypoints.length > 0) {
            activeLandmarks = hand.keypoints.map(kp => ({ x: kp.x / canvas.width, y: kp.y / canvas.height }));
            drawHandLandmarks(activeLandmarks, canvas.width, canvas.height);
            evaluateHandPose(activeLandmarks);
          } else {
            armUp = false;
            lastArmUp = false;
            debugInfoSpan.innerText = "🤚 Hand detected but no landmarks?";
          }
        } else {
          armUp = false;
          lastArmUp = false;
          debugInfoSpan.innerText = "🤚 No hand, show one clearly";
        }
      } catch (err) {
        console.warn("Detection error", err);
      }
      requestAnimationFrame(detectHands);
    }

    // Game timer logic
    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!gameActive) return;
        if (timeLeft <= 0.01) {
          // GAME OVER
          gameActive = false;
          if (timerInterval) clearInterval(timerInterval);
          timerInterval = null;
          gameStatusSpan.innerText = `⏰ GAME OVER! Final Score: ${totalScore} (${currentRawPumps} pumps) ⏰`;
          startBtn.innerText = '▶ START GAME';
          startBtn.disabled = false;
        } else {
          timeLeft -= 0.1;
          if (timeLeft < 0) timeLeft = 0;
          timerDisplaySpan.innerText = timeLeft.toFixed(2);
        }
      }, 100);
    }

    function resetGameStats(keepSettings=true) {
      // stop game activity
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      gameActive = false;
      currentRawPumps = 0;
      totalScore = 0;
      timeLeft = parseFloat(durationInput.value);
      if (isNaN(timeLeft)) timeLeft = 20;
      totalScoreSpan.innerText = "0";
      rawCountSpan.innerText = "0";
      timerDisplaySpan.innerText = timeLeft.toFixed(2);
      armUp = false;
      lastArmUp = false;
      startBtn.innerText = '▶ START GAME';
      startBtn.disabled = false;
      gameStatusSpan.innerText = `🔄 Reset. Press START to begin (multiplier ${multiplierInput.value}x)`;
    }

    function startGame() {
      if (gameActive) return;
      // load fresh settings
      let duration = parseFloat(durationInput.value);
      if (isNaN(duration) || duration <= 0) duration = 20;
      timeLeft = duration;
      currentRawPumps = 0;
      totalScore = 0;
      totalScoreSpan.innerText = "0";
      rawCountSpan.innerText = "0";
      timerDisplaySpan.innerText = timeLeft.toFixed(2);
      armUp = false;
      lastArmUp = false;
      lastPumpTimestamp = 0;
      
      gameActive = true;
      if (timerInterval) clearInterval(timerInterval);
      startTimer();
      gameStatusSpan.innerText = `🔥 GAME ACTIVE | Multiplier ${multiplierInput.value}x! Raise hand! 🔥`;
      startBtn.innerText = '▶ GAME RUNNING';
      startBtn.disabled = true;
      setTimeout(() => {
        if (gameActive) startBtn.disabled = false;
        else startBtn.disabled = false;
      }, 200);
    }

    // Synchronize threshold from UI
    function syncThreshold() {
      let val = parseFloat(thresholdInput.value);
      if (isNaN(val)) val = 0.40;
      pumpThreshold = Math.min(0.85, Math.max(0.12, val));
      thresholdInput.value = pumpThreshold;
    }

    // initialize camera and mediapipe hand detector
    async function initCameraAndMediaPipe() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        await new Promise((resolve) => { video.onloadedmetadata = () => resolve(); });
        video.play();

        // setup handpose detection with tensorflow mediapipe
        const model = handPoseDetection.SupportedModels.MediaPipeHands;
        const detectorConfig = {
          runtime: 'mediapipe',
          solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915',
          modelComplexity: 1,
          minDetectionConfidence: 0.5,
          minTrackingConfidence: 0.5
        };
        detector = await handPoseDetection.createDetector(model, detectorConfig);
        console.log("Hand detector ready");
        // start detection loop
        detectHands();
        gameStatusSpan.innerText = "✅ Camera active + AI ready. Press START!";
      } catch (err) {
        console.error("Camera error", err);
        gameStatusSpan.innerText = "❌ Camera access denied or error. Check permissions.";
      }
    }

    // Event listeners
    startBtn.addEventListener('click', () => {
      if (!gameActive) {
        resetGameStats(true);
        startGame();
      }
    });
    resetBtn.addEventListener('click', () => {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = null;
      gameActive = false;
      resetGameStats(true);
      startBtn.innerText = '▶ START GAME';
      startBtn.disabled = false;
    });

    multiplierInput.addEventListener('input', () => {
      updateMultiplierDisplay();
      if (!gameActive) {
        // just visual
        gameStatusSpan.innerText = `Multiplier set to ${multiplierInput.value}x. Press START.`;
      } else {
        // multiplier changes live during game? yes, new pumps will use new multiplier
        gameStatusSpan.innerText = `⚡ MULTIPLIER changed to ${multiplierInput.value}x during game! ⚡`;
      }
    });

    thresholdInput.addEventListener('input', () => {
      syncThreshold();
      if (!gameActive) gameStatusSpan.innerText = `Threshold = ${pumpThreshold} (hand Y < threshold = up)`;
    });

    durationInput.addEventListener('change', () => {
      if (!gameActive) {
        let val = parseFloat(durationInput.value);
        if (!isNaN(val)) timerDisplaySpan.innerText = val.toFixed(2);
        resetGameStats(true);
      }
    });

    syncThreshold();
    updateMultiplierDisplay();
    resetGameStats(true);
    initCameraAndMediaPipe();
  })();
</script>
</body>
</html>
