<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DingleV4Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Outfit:wght@200;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink:    #010d1a;
      --deep:   #021425;
      --mid:    #05304f;
      --teal:   #0891b2;
      --foam:   #22d3ee;
      --glint:  #a5f3fc;
      --border: rgba(34,211,238,0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      background: var(--ink);
      font-family: 'Outfit', sans-serif;
      color: var(--glint);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    canvas { position: fixed; inset: 0; z-index: 0; }
    #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .p {
      position: absolute; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, rgba(165,243,252,0.7), rgba(34,211,238,0.08));
      animation: floatUp linear infinite; pointer-events: none;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      8%   { opacity: 1; }
      85%  { opacity: 0.4; }
      100% { transform: translateY(-105vh) translateX(var(--dx)); opacity: 0; }
    }
    .scanlines {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px,
        rgba(0,0,0,0.035) 2px, rgba(0,0,0,0.035) 4px);
    }

    /* ── HOME SCREEN ── */
    #home {
      position: relative; z-index: 10;
      width: min(520px, 92vw);
      display: flex; flex-direction: column; align-items: center;
      transition: opacity .35s, transform .35s;
    }
    #home.hidden { opacity: 0; transform: translateY(-18px); pointer-events: none; position: absolute; }

    .logo-area { text-align: center; margin-bottom: 38px; }
    .ring-wrap {
      display: inline-flex; align-items: center; justify-content: center;
      position: relative; margin-bottom: 18px;
    }
    .ring {
      position: absolute; border-radius: 50%;
      border: 1.5px solid rgba(34,211,238,0.22);
      animation: pulse-ring 3.2s ease-in-out infinite;
    }
    .ring:nth-child(1) { width: 80px;  height: 80px; }
    .ring:nth-child(2) { width: 104px; height: 104px; animation-delay: .7s; opacity: .5; }
    .ring:nth-child(3) { width: 128px; height: 128px; animation-delay: 1.4s; opacity: .25; }
    @keyframes pulse-ring { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
    .trident {
      position: relative; z-index: 2;
      filter: drop-shadow(0 0 16px rgba(34,211,238,0.55));
      animation: bob 4s ease-in-out infinite;
    }
    @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-7px);} }
    h1 {
      font-family: 'Cinzel Decorative', serif; font-weight: 900;
      font-size: clamp(1.5rem, 5.5vw, 2.15rem); letter-spacing: .02em;
      background: linear-gradient(135deg, #a5f3fc 0%, #22d3ee 45%, #0891b2 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 22px rgba(34,211,238,0.38)); margin-bottom: 7px;
    }
    .sub {
      font-size: .68rem; letter-spacing: .28em; text-transform: uppercase;
      color: rgba(34,211,238,0.38); font-weight: 200;
    }

    .card {
      width: 100%;
      background: linear-gradient(145deg, rgba(5,48,79,0.55), rgba(2,20,37,0.82));
      border: 1px solid var(--border); border-radius: 20px;
      padding: 28px 28px 24px;
      backdrop-filter: blur(26px);
      box-shadow: 0 0 0 1px rgba(165,243,252,0.04),
                  0 32px 80px rgba(1,13,26,0.75),
                  inset 0 1px 0 rgba(165,243,252,0.05);
    }

    .row {
      display: flex; align-items: center; gap: 9px;
      background: rgba(1,13,26,0.65);
      border: 1.5px solid var(--border);
      border-radius: 13px;
      padding: 5px 5px 5px 17px;
      transition: border-color .3s, box-shadow .3s;
    }
    .row:focus-within {
      border-color: var(--foam);
      box-shadow: 0 0 0 3px rgba(34,211,238,0.11), 0 0 36px rgba(34,211,238,0.06);
    }
    .row svg.ico { flex-shrink:0; color:rgba(34,211,238,0.38); transition:color .3s; }
    .row:focus-within svg.ico { color:var(--foam); }

    input[type="text"] {
      flex:1; background:transparent; border:none; outline:none;
      color:var(--glint); font-family:'Outfit',sans-serif;
      font-size:.96rem; font-weight:400; caret-color:var(--foam);
    }
    input::placeholder { color:rgba(165,243,252,0.2); }

    .btn-primary {
      flex-shrink:0;
      background:linear-gradient(135deg,#22d3ee,#0891b2);
      border:none; border-radius:9px;
      padding:10px 20px; color:#011725;
      font-family:'Outfit',sans-serif; font-size:.8rem;
      font-weight:500; letter-spacing:.1em; text-transform:uppercase;
      cursor:pointer; display:flex; align-items:center; gap:6px;
      transition:transform .18s, box-shadow .18s, filter .18s;
      box-shadow:0 4px 18px rgba(34,211,238,0.22);
    }
    .btn-primary:hover { transform:scale(1.05); filter:brightness(1.13); box-shadow:0 6px 28px rgba(34,211,238,0.42); }
    .btn-primary:active { transform:scale(0.97); }

    .status {
      margin-top:18px; font-size:.65rem; letter-spacing:.15em; text-transform:uppercase;
      color:rgba(34,211,238,0.26); text-align:center;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .dot {
      width:5px; height:5px; border-radius:50%;
      background:var(--foam); box-shadow:0 0 6px var(--foam);
      animation:blink 2.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.2;} }

    /* ── RESULT SCREEN ── */
    #result-screen {
      position: fixed; inset: 0; z-index: 20;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none;
      transition: opacity .35s;
    }
    #result-screen.visible { opacity: 1; pointer-events: all; }

    /* top bar */
    .top-bar {
      position: relative; z-index: 30;
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      background: rgba(1,13,26,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
    }

    .back-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1.5px solid rgba(34,211,238,0.3);
      border-radius: 9px;
      padding: 7px 13px;
      color: var(--foam);
      font-family: 'Outfit', sans-serif; font-size: .78rem;
      font-weight: 500; letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background .2s, border-color .2s;
    }
    .back-btn:hover { background: rgba(34,211,238,0.09); border-color: var(--foam); }

    .bar-logo {
      font-family: 'Cinzel Decorative', serif; font-weight: 900;
      font-size: .95rem; letter-spacing: .04em;
      background: linear-gradient(135deg,#a5f3fc,#22d3ee,#0891b2);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      white-space: nowrap;
    }

    .bar-row {
      flex: 1;
      display: flex; align-items: center; gap: 8px;
      background: rgba(1,13,26,0.7);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 4px 4px 4px 14px;
      transition: border-color .3s;
      min-width: 0;
    }
    .bar-row:focus-within { border-color: var(--foam); }
    .bar-row svg.ico { flex-shrink:0; color:rgba(34,211,238,0.38); }
    .bar-row:focus-within svg.ico { color:var(--foam); }
    .bar-row input[type="text"] { font-size:.88rem; }

    .bar-go {
      flex-shrink: 0;
      background: linear-gradient(135deg,#22d3ee,#0891b2);
      border: none; border-radius: 7px;
      padding: 7px 14px; color: #011725;
      font-family: 'Outfit',sans-serif; font-size: .75rem;
      font-weight: 500; letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; transition: filter .18s, transform .15s;
    }
    .bar-go:hover { filter: brightness(1.13); transform: scale(1.04); }
    .bar-go:active { transform: scale(0.97); }

    /* iframe */
    #frame-wrap {
      flex: 1;
      position: relative;
      background: #010d1a;
    }

    #loader {
      position: absolute; inset: 0; z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: rgba(1,13,26,0.97);
      transition: opacity .4s;
    }
    #loader.gone { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2.5px solid rgba(34,211,238,0.15);
      border-top-color: var(--foam);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-txt {
      font-size: .72rem; letter-spacing: .2em; text-transform: uppercase;
      color: rgba(34,211,238,0.45);
    }

    #proxy-frame {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
      background: white;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="particles"></div>
<div class="scanlines"></div>

<!-- ══ HOME ══════════════════════════════════════════════════════════════ -->
<div id="home">
  <div class="logo-area">
    <div class="ring-wrap">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <svg class="trident" width="54" height="54" viewBox="0 0 54 54" fill="none">
        <circle cx="27" cy="27" r="25" fill="rgba(34,211,238,0.07)" stroke="rgba(34,211,238,0.28)" stroke-width="1.2"/>
        <line x1="27" y1="13" x2="27" y2="43" stroke="#22d3ee" stroke-width="2.4" stroke-linecap="round"/>
        <line x1="18" y1="13" x2="18" y2="25" stroke="#22d3ee" stroke-width="2.1" stroke-linecap="round"/>
        <line x1="36" y1="13" x2="36" y2="25" stroke="#22d3ee" stroke-width="2.1" stroke-linecap="round"/>
        <path d="M16 13 Q18 18 20 13" stroke="#a5f3fc" stroke-width="1.7" fill="none" stroke-linecap="round"/>
        <path d="M25 13 Q27 18 29 13" stroke="#a5f3fc" stroke-width="1.7" fill="none" stroke-linecap="round"/>
        <path d="M34 13 Q36 18 38 13" stroke="#a5f3fc" stroke-width="1.7" fill="none" stroke-linecap="round"/>
        <line x1="15" y1="29" x2="39" y2="29" stroke="rgba(34,211,238,0.45)" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="27" cy="43" r="2.4" fill="none" stroke="#22d3ee" stroke-width="1.4"/>
      </svg>
    </div>
    <h1>DingleV4Hub</h1>
    <p class="sub">Ocean Edition &nbsp;·&nbsp; Deep Dive Access</p>
  </div>

  <div class="card">
    <form onsubmit="doSearch(event)">
      <div class="row">
        <svg class="ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="si" type="text" placeholder="Search or enter a URL…" autocomplete="off" spellcheck="false"/>
        <button class="btn-primary" type="submit">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Dive
        </button>
      </div>
    </form>
  </div>

  <div class="status"><div class="dot"></div>Proxy Online &nbsp;·&nbsp; No New Tabs</div>
</div>

<!-- ══ RESULT SCREEN ══════════════════════════════════════════════════════ -->
<div id="result-screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Home
    </button>
    <span class="bar-logo">D4H</span>
    <form style="flex:1;min-width:0;" onsubmit="doSearch(event)">
      <div class="bar-row">
        <svg class="ico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="bi" type="text" placeholder="Search or enter a URL…" autocomplete="off" spellcheck="false"/>
        <button class="bar-go" type="submit">Go</button>
      </div>
    </form>
  </div>

  <div id="frame-wrap">
    <div id="loader">
      <div class="loader-ring"></div>
      <p class="loader-txt">Diving in…</p>
    </div>
    <iframe id="proxy-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>
  </div>
</div>

<script>
  const home   = document.getElementById('home');
  const result = document.getElementById('result-screen');
  const frame  = document.getElementById('proxy-frame');
  const loader = document.getElementById('loader');
  const si     = document.getElementById('si');  // home input
  const bi     = document.getElementById('bi');  // bar input

  function isURL(str) {
    return /^(https?:\/\/|www\.)/i.test(str) || /^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(str);
  }

  function loadProxy(url) {
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    bi.value = url;
    loader.classList.remove('gone');
    frame.src = '';
    // Show result screen
    home.classList.add('hidden');
    result.classList.add('visible');
    // Load in iframe via proxy endpoint
    frame.src = '/proxy?url=' + encodeURIComponent(url);
    frame.onload = () => loader.classList.add('gone');
  }

  function doSearch(e) {
    e.preventDefault();
    // whichever input triggered it
    const q = (document.activeElement.closest('form') === si.closest('form') ? si : bi).value.trim()
              || si.value.trim() || bi.value.trim();
    if (!q) return;

    // sync both inputs
    si.value = q;
    bi.value = q;

    if (isURL(q)) {
      loadProxy(q);
    } else {
      // DuckDuckGo search through proxy
      const ddgURL = 'https://duckduckgo.com/?q=' + encodeURIComponent(q);
      loadProxy(ddgURL);
    }
  }

  function goHome() {
    result.classList.remove('visible');
    home.classList.remove('hidden');
    frame.src = '';
    si.value = '';
    bi.value = '';
  }
</script>

<script>
  /* Ocean canvas */
  (function(){
    const c=document.getElementById('c'),ctx=c.getContext('2d');
    let W,H,t=0;
    const resize=()=>{W=c.width=innerWidth;H=c.height=innerHeight;};
    addEventListener('resize',resize);resize();
    function draw(){
      t+=0.007;ctx.clearRect(0,0,W,H);
      const g=ctx.createLinearGradient(0,0,0,H);
      g.addColorStop(0,'#010d1a');g.addColorStop(.6,'#021e35');g.addColorStop(1,'#033050');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
      for(let i=0;i<5;i++){
        const x=W*(.08+i*.2+Math.sin(t*.9+i*1.3)*.05);
        const lg=ctx.createLinearGradient(x,0,x+50,H*.7);
        lg.addColorStop(0,'rgba(34,211,238,0.05)');lg.addColorStop(1,'transparent');
        ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+70,H*.7);
        ctx.lineTo(x+40,H*.7);ctx.lineTo(x-20,0);
        ctx.fillStyle=lg;ctx.fill();
      }
      [[30,.004,0,.16,H*.70],[22,.007,1.8,.20,H*.77],
       [16,.011,3.5,.26,H*.83],[10,.017,1.1,.33,H*.89]].forEach(([a,f,ph,al,y])=>{
        ctx.beginPath();ctx.moveTo(0,H);
        for(let x=0;x<=W;x+=3)ctx.lineTo(x,y+Math.sin(x*f+ph+t)*a+Math.sin(x*f*1.6+ph*1.4+t*1.3)*(a*.35));
        ctx.lineTo(W,H);ctx.closePath();
        const wg=ctx.createLinearGradient(0,y-a,0,H);
        wg.addColorStop(0,`rgba(8,145,178,${al})`);wg.addColorStop(1,`rgba(2,20,37,${al*.5})`);
        ctx.fillStyle=wg;ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* Particles */
  (function(){
    const box=document.getElementById('particles');
    for(let i=0;i<18;i++){
      const d=document.createElement('div');d.className='p';
      const s=4+Math.random()*15,dx=(Math.random()-.5)*60;
      d.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:-20px;
        --dx:${dx}px;animation-duration:${10+Math.random()*16}s;animation-delay:${Math.random()*14}s;opacity:0;`;
      box.appendChild(d);
    }
  })();
</script>
</body>
</html>
